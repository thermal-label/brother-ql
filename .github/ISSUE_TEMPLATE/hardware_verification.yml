name: Hardware verification
description: Report your testing results for an expected Brother QL device — works, partial, or broken.
title: "Hardware: [Device name] ([PID])"
labels: ["hardware"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to test! Fill in what you can — even partial results help.
        Run `brother-ql list` and `brother-ql print text "test" --media 259` to get started.

  - type: dropdown
    id: result
    attributes:
      label: Result
      description: What was the overall outcome?
      options:
        - "✅ Works perfectly"
        - "⚠️ Partially works"
        - "❌ Does not work"
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Device model
      placeholder: "e.g. QL-710W"
    validations:
      required: true

  - type: input
    id: pid
    attributes:
      label: USB PID
      description: "Find it with `lsusb | grep -i brother` (Linux/macOS) or Device Manager (Windows)."
      placeholder: "e.g. 0x2044"
    validations:
      required: true

  - type: dropdown
    id: connection
    attributes:
      label: Connection type tested
      multiple: true
      options:
        - USB
        - TCP (network)
        - WebUSB (browser)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
      multiple: false
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node version
      placeholder: "e.g. v24.0.0  (run: node -v)"
    validations:
      required: true

  - type: input
    id: pkg_version
    attributes:
      label: Package version
      placeholder: "e.g. 0.3.1  (run: pnpm list @thermal-label/brother-ql-node)"
    validations:
      required: true

  - type: checkboxes
    id: tests
    attributes:
      label: Tests run
      options:
        - label: "`brother-ql list` — device appears in the list"
        - label: "`brother-ql print text \"test\" --media 259` — label printed successfully"
        - label: "`brother-ql status` — returned valid status"
        - label: "`brother-ql print image <file>` — image label printed successfully"
        - label: "`brother-ql print text \"test\" --host <ip>` — TCP print worked (network models only)"
        - label: "Two-color print — black + red label printed correctly (QL-800 series only)"

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Quirks, workarounds, partial failure details, or anything else relevant.
      placeholder: "e.g. TCP print works but auto-cut doesn't trigger, status command times out on second call…"
